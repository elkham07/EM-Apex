<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EM Apex — Register</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: #fff; font-family: 'Inter', sans-serif; }
    .auth-box { background: #1e1e1e; padding: 40px; border-radius: 12px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    .auth-input { width: 100%; padding: 14px; margin: 10px 0; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
    .auth-input:focus { border-color: #22c55e; }
    .auth-btn { width: 100%; padding: 14px; background: #22c55e; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 16px; transition: background 0.2s; }
    .auth-btn:hover { background: #1ea34a; }
    .logo-text { font-size: 24px; font-weight: 800; margin-bottom: 20px; display: inline-block; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="logo-text">EM<sup>Apex</sup></div>
    <h2 style="margin-bottom: 20px;">Create Account</h2>
    <input type="email" id="email" class="auth-input" placeholder="Enter your email" />
    <input type="password" id="password" class="auth-input" placeholder="Choose a password" />
    <button id="register-btn" class="auth-btn">Register</button>
    <p style="margin-top:20px;font-size:14px;color:#b0b0b0;">Already have an account? <a href="login.html" style="color:#5b6aff;text-decoration:none;">Log In</a></p>
  </div>
  <script>
    document.getElementById('register-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('http://localhost:3000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role: 'worker' })
        });
        const data = await res.json();
        
        if (res.ok) {
          alert('Registered! Please login.');
          window.location.href = 'login.html';
        } else {
          alert(data.message || 'Registration failed');
        }
      } catch (err) {
        alert('Cannot connect to the server');
      }
    });
  </script>
</body>
</html>
