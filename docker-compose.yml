services:
  # ==========================================
  # Frontend Apps (Served via Nginx)
  # ==========================================
  worker-app:
    build:
      context: ./worker-app
    container_name: emapex_worker_app
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - emapex_net

  admin-app:
    build:
      context: ./admin-app
    container_name: emapex_admin_app
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - emapex_net

  # ==========================================
  # API Gateway (Public Access Point)
  # ==========================================
  api-gateway:
    build:
      context: ./api-gateway
    container_name: emapex_api_gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TASK_SERVICE_URL=http://task-service:3002
      - SUBMISSION_SERVICE_URL=http://submission-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - PROFILE_SERVICE_URL=http://profile-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    restart: unless-stopped
    depends_on:
      - auth-service
    networks:
      - emapex_net

  # ==========================================
  # Microservices (Internal only - NO public ports exposed)
  # ==========================================
  auth-service:
    build:
      context: ./services/auth-service
    container_name: emapex_auth_service
    depends_on:
      - postgres
    environment:
      - PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NATS_URL=${NATS_URL}
    restart: unless-stopped
    networks:
      - emapex_net

  task-service:
    build:
      context: ./services/task-service
    container_name: emapex_task_service
    environment:
      - PORT=3002
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - emapex_net

  submission-service:
    build:
      context: ./services/submission-service
    container_name: emapex_submission_service
    environment:
      - PORT=3003
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NATS_URL=${NATS_URL}
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    networks:
      - emapex_net

  payment-service:
    build:
      context: ./services/payment-service
    container_name: emapex_payment_service
    environment:
      - PORT=3004
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NATS_URL=${NATS_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    networks:
      - emapex_net

  profile-service:
    build:
      context: ./services/profile-service
    container_name: emapex_profile_service
    environment:
      - PORT=3006
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NATS_URL=${NATS_URL}
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    networks:
      - emapex_net

  notification-service:
    build:
      context: ./services/notification-service
    container_name: emapex_notification_service
    environment:
      - PORT=3005
      - NATS_URL=${NATS_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    restart: unless-stopped
    depends_on:
      - nats
    networks:
      - emapex_net

  # ==========================================
  # Infrastructure (Bound to localhost / 127.0.0.1)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: emapex_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5445:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - emapex_net

  redis:
    image: redis:7-alpine
    container_name: emapex_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - emapex_net

  nats:
    image: nats:alpine
    container_name: emapex_nats
    ports:
      - "127.0.0.1:4222:4222" # Client port bound to localhost
      - "127.0.0.1:8222:8222" # HTTP management port bound to localhost
    command: ["-m", "8222"]
    restart: unless-stopped
    networks:
      - emapex_net

  # ==========================================
  # Observability Stack (Bound to localhost / 127.0.0.1)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: emapex_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - emapex_net

  grafana:
    image: grafana/grafana:latest
    container_name: emapex_grafana
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - emapex_net

networks:
  emapex_net:
    driver: bridge
    attachable: true

volumes:
  pgdata:
  redisdata:
  grafanadata:
