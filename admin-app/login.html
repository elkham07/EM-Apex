<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EM Apex Admin — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f0f13; color: #fff; font-family: 'Inter', sans-serif; }
    .auth-box { background: #1a1a24; padding: 40px; border-radius: 12px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .auth-input { width: 100%; padding: 14px; margin: 10px 0; background: #252533; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
    .auth-input:focus { border-color: #ff5c5c; }
    .auth-btn { width: 100%; padding: 14px; background: #ff5c5c; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 16px; transition: background 0.2s; }
    .auth-btn:hover { background: #e04848; }
    .logo-text { font-size: 24px; font-weight: 800; margin-bottom: 20px; display: inline-block; color: #ff5c5c; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="logo-text">EM<sup>Apex</sup> ADMIN</div>
    <h2 style="margin-bottom: 20px;">Admin Access</h2>
    <input type="email" id="email" class="auth-input" placeholder="Admin Email" />
    <input type="password" id="password" class="auth-input" placeholder="Password" />
    <button id="login-btn" class="auth-btn">Log In</button>
    <p style="margin-top:20px;font-size:14px;color:#b0b0b0;">Need an admin account? <a href="register.html" style="color:#ff5c5c;text-decoration:none;">Register</a></p>
  </div>
  <script>
    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          if (data.user.role !== 'admin') {
             alert('Access denied. Admin role required.');
             return;
          }
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminId', data.user.id);
          window.location.href = 'index.html';
        } else {
          alert(data.message || 'Login failed');
        }
      } catch (err) {
        alert('Cannot connect to the server');
      }
    });
  </script>
</body>
</html>
